<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quantum GAN Challenge</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Quantum GAN Challenge</h1>

        <p class="subtitle">
            One image is from the OptDigits dataset.
            The other was generated by a Quantum Conditional GAN.
            Can you tell which one is <b>REAL</b>?
        </p>

        <div class="scoreboard">

            <div class="score-box">

                <div class="score-title">
                    Current Streak
                </div>

                <div class="score-value" id="streak">
                    0
                </div>

            </div>

            <div class="score-box">

                <div class="score-title">
                    Best Streak
                </div>

                <div class="score-value" id="best">
                    0
                </div>

            </div>

            <div class="score-box">

                <div class="score-title">
                    Accuracy
                </div>

                <div class="score-value" id="accuracy">
                    0%
                </div>

            </div>

        </div>

        <div class="images">

            <div class="image-card">

                <img id="leftImage" src="" alt="Left Image">

                <button id="leftButton" onclick="guess('left')">
                    This one is FAKE
                </button>

            </div>

            <div class="image-card">

                <img id="rightImage" src="" alt="Right Image">

                <button id="rightButton" onclick="guess('right')">
                    This one is FAKE
                </button>

            </div>

        </div>

        <div id="message" class="message">

        </div>

        <div id="reveal" class="reveal">

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
